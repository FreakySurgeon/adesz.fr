name: Build and Deploy to OVH

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Inject secrets into config.php
        run: |
          sed -i "s|sk_test_REPLACE_ME|${{ secrets.STRIPE_SECRET_KEY_LIVE }}|" dist/api/config.php
          sed -i "s|\$stripe_mode = trim('test')|\$stripe_mode = trim('live')|" dist/api/config.php
          sed -i "s|whsec_REPLACE_ME|${{ secrets.STRIPE_WEBHOOK_SECRET_LIVE }}|" dist/api/config.php
          sed -i "s|xkeysib-REPLACE_ME|${{ secrets.BREVO_API_KEY }}|" dist/api/config.php
          sed -i "s|trim('0')|trim('${{ secrets.BREVO_LIST_ADHERENTS }}')|1" dist/api/config.php
          sed -i "s|trim('0')|trim('${{ secrets.BREVO_LIST_DONATEURS }}')|1" dist/api/config.php
          sed -i "s|trim('0')|trim('${{ secrets.BREVO_LIST_TOUS }}')|1" dist/api/config.php
          sed -i "s|admin@REPLACE_ME|${{ secrets.ADMIN_EMAIL }}|" dist/api/config.php

      - name: Deploy to OVH via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/
          server-dir: ./www/
