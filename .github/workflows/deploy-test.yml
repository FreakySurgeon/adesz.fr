name: Deploy to adesz.fr/test

on:
  # push:
  #   branches: [staging]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build
        env:
          ASTRO_BASE: /test

      - name: Inject secrets for staging
        run: |
          sed -i "s|sk_test_REPLACE_ME|${{ secrets.STRIPE_SECRET_KEY_TEST }}|" dist/api/config.php
          sed -i "s|\$base_path = '';|\$base_path = '/test';|" dist/api/config.php
          sed -i "s|whsec_REPLACE_ME|${{ secrets.STRIPE_WEBHOOK_SECRET_TEST }}|" dist/api/config.php
          sed -i "s|xkeysib-REPLACE_ME|${{ secrets.BREVO_API_KEY }}|" dist/api/config.php
          sed -i "s|LIST_ADHERENTS_REPLACE_ME|${{ secrets.BREVO_LIST_ADHERENTS }}|" dist/api/config.php
          sed -i "s|LIST_DONATEURS_REPLACE_ME|${{ secrets.BREVO_LIST_DONATEURS }}|" dist/api/config.php
          sed -i "s|LIST_TOUS_REPLACE_ME|${{ secrets.BREVO_LIST_TOUS }}|" dist/api/config.php
          sed -i "s|admin@REPLACE_ME|${{ secrets.ADMIN_EMAIL }}|" dist/api/config.php
          sed -i "s|DB_HOST_REPLACE_ME|${{ secrets.DB_HOST }}|" dist/api/config.php
          sed -i "s|DB_NAME_REPLACE_ME|${{ secrets.DB_NAME }}|" dist/api/config.php
          sed -i "s|DB_USER_REPLACE_ME|${{ secrets.DB_USER }}|" dist/api/config.php
          sed -i "s|DB_PASS_REPLACE_ME|${{ secrets.DB_PASS }}|" dist/api/config.php
          sed -i "s|ADMIN_KEY_REPLACE_ME|${{ secrets.ADMIN_KEY }}|" dist/api/config.php

      - name: Deploy to adesz.fr/test via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/
          server-dir: ./www/test/
